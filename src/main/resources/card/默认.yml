性别卡:
  #代表插件自带卡片，不可自定义
  type: "system"
  name: '&b任意性别卡'
  id: "PAPER"
  lore:
    - "&e设置指定精灵性别"
  # 过滤方法 [white, black]{白名单 黑名单}
  use:
    filter: black
    poke:
      #更加标签添加宝可梦，就是拥有该标签的宝可梦添加进去
      #可添加的标签分别是
      #mythical 幻兽
      #restricted 一级神
      #legendary 神兽
      #ultra_beast 异兽
      #fossil 化石宝可梦
      #powerhouse 准神
      #paradox 悖论
      #gen1 第一世代
      #gen2 第二世代
      #gen3 第三世代
      #gen4 第四世代
      #gen5 第五世代
      #gen6 第六世代
      #gen7 第七世代
      #gen8 第八世代
      #gen9 第九世代
      label: ''
      #以下是宝可梦编号,1@131就是1到131的宝可梦全在
      speciesDex:
      #可重复复制精灵可到达概率
      species:
        - '百变怪'
        #禁止出现的宝可梦，禁止的宝可梦将不会被开出，哪怕上方有写,配置与上方一样
      banPoke:
        label: ''
        speciesDex:
        species:
