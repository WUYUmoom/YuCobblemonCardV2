自选性别卡:
  #代表插件自带卡片，不可自定义
  type: "system"
  name: '&b自选性别卡'
  id: "PAPER"
  lore:
    - "&e设置指定精灵性别"
  # 过滤方法 [white, black]{白名单 黑名单}
  use:
    filter: black
    poke:
    - "百变怪"
6v卡:
  type: "system"
  name: '&b6V卡'
  id: "PAPER"
  lore:
    - "&e将全部精灵个体改为6v"
  view: "队伍"
  use:
    filter: black
    poke:
      - "百变怪"
