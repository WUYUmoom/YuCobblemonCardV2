技能卡:
  #特殊卡片，技能卡，可自定义，用于创建自定义技能卡
  type: "move"
  name: '&b自选技能卡'
  id: "PAPER"
  lore:
    - "&e设置精灵技能"
  #包含的招式
  move:
    - "egg"
    - "tm"
    - "tutor"
    - "level"
    - "legacy"
    - "special"
    - "evolution"
    - "form"
  use:
    filter: black
    poke:
      - "百变怪"
#以下为自定义卡片
